services:
  nuxt-chat:
    build: .
    container_name: nuxt3-chat-ui
    ports:
      - '3000:3000'
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      GIGACHAT_ENDPOINT: ${GIGACHAT_ENDPOINT:-/api/chat}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat}
    restart: unless-stopped
